<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Móvil APAP - Código OTP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="styles.css" rel="stylesheet">
</head>
<body>
    <div class="mobile-container otp-container">
        <!-- Header -->
        <div class="header">
            <button class="back-btn" onclick="goBack()">
                <i class="fas fa-arrow-left"></i>
            </button>
            <h1>Móvil <span class="text-warning">APAP</span></h1>
        </div>

        <!-- Content -->
        <div class="content">
            <!-- Title Section -->
            <div class="title-section">
                <h2>Registra tu dispositivo</h2>
            </div>
            
            <!-- Timer Section -->
            <div class="timer-section">
                <div class="timer-display" id="timerDisplay">01:55</div>
                <p class="timer-label">Tiempo restante</p>
            </div>

            <!-- OTP Input Section -->
            <div class="otp-section">
                <h2 class="otp-title"></h2>
                
                <div class="otp-input-container">
                    <input type="text" 
                           class="otp-input" 
                           id="otpInput" 
                           placeholder="" 
                           maxlength="6" 
                           pattern="[0-9]{6}" 
                           inputmode="numeric">
                </div>

                <button class="confirm-button" id="validateButton" onclick="validateOTP()" disabled>
                    Validar
                </button>

                <button class="resend-button" onclick="resendCode()">
                    Reenviar código
                </button>
            </div>
        </div>
    </div>

    <script src="otp.js"></script>
</body>
</html>
