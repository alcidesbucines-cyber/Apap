<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Móvil APAP - Registro Exitoso</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="styles.css" rel="stylesheet">
</head>
<body>
    <div class="mobile-container success-container">
        <!-- Header con logo -->
        <div class="header">
            <h1>Móvil <span class="text-warning">APAP</span></h1>
        </div>

        <!-- Contenido principal -->
        <div class="success-content">
            <!-- Icono de éxito -->
            <div class="success-icon">
                <i class="fas fa-check-circle"></i>
            </div>

            <!-- Mensaje de éxito -->
            <div class="success-message">
                <h2>¡Registro exitoso!</h2>
                <p>Tu dispositivo ha sido registrado correctamente en Móvil APAP.</p>
            </div>

            <!-- Botón de continuar -->
            <button class="btn btn-primary success-button" onclick="goToHome()">
                Continuar
            </button>
        </div>
    </div>

    <script>
        function goToHome() {
            // Redirigir a la página principal o dashboard
            window.location.href = 'https://apap.com.do';
        }
    </script>
</body>
</html>
