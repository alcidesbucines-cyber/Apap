<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Móvil APAP - Inicio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="styles.css" rel="stylesheet">
</head>
<body>
    <div class="mobile-container">
        <!-- Header -->
        <div class="header">
            <h1>Móvil APAP</h1>
        </div>

        <!-- Content -->
        <div class="content">
            <!-- Logo Section -->
            <div class="logo-section">
                <div class="logo-circle"></div>
                <div class="logo-text">
                    <span class="text-warning fw-bold">Móvil</span>
                    <span class="text-dark fw-bold">APAP</span>
                </div>
            </div>

            <!-- Registration Form -->
            <form class="registration-form" id="registrationForm">
                <div class="form-group">
                    <select class="custom-select" id="serviceType" required>
                        <option value="" disabled selected>Tipo de servicio</option>
                        <option value="cuenta-personal">Cuenta Personal</option>
                        <option value="prestamo">Préstamo</option>
                        <option value="tarjeta-credito">Tarjeta de Crédito</option>
                        <option value="inversiones">Inversiones</option>
                        <option value="seguros">Seguros</option>
                    </select>
                </div>

                <div class="form-group">
                    <input type="text" 
                           class="custom-input" 
                           id="fullName" 
                           placeholder="Nombre completo" 
                           required>
                </div>

                <div class="form-group">
                    <input type="tel" 
                           class="custom-input" 
                           id="phone" 
                           placeholder="Teléfono de contacto" 
                           required>
                </div>

                <div class="form-group">
                    <input type="email" 
                           class="custom-input" 
                           id="email" 
                           placeholder="Correo electrónico" 
                           required>
                </div>

                <button type="submit" class="btn-primary-custom">
                    Entrar
                </button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('registrationForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Validar que todos los campos estén llenos
            const serviceType = document.getElementById('serviceType').value;
            const fullName = document.getElementById('fullName').value;
            const phone = document.getElementById('phone').value;
            const email = document.getElementById('email').value;
            
            if (!serviceType || !fullName || !phone || !email) {
                alert('Por favor, complete todos los campos.');
                return;
            }
            
            // Mostrar pantalla de carga
            showLoadingScreen();
            
            // Redirigir a login.html después de 3 segundos
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 1500);
        });
        
        function showLoadingScreen() {
            // Crear overlay de carga
            const loadingOverlay = document.createElement('div');
            loadingOverlay.id = 'loadingOverlay';
            loadingOverlay.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: linear-gradient(135deg, #f8f9fa 0%, #ffffff 100%);
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                z-index: 9999;
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            `;
            
            // Logo de carga
            const loadingLogo = document.createElement('div');
            loadingLogo.style.cssText = `
                width: 80px;
                height: 80px;
                background: #ffc107;
                border-radius: 50%;
                margin-bottom: 30px;
                animation: pulse 2s ease-in-out infinite;
                box-shadow: 0 4px 20px rgba(255, 193, 7, 0.3);
            `;
            
            // Spinner
            const spinner = document.createElement('div');
            spinner.style.cssText = `
                width: 40px;
                height: 40px;
                border: 3px solid #f3f3f3;
                border-top: 3px solid #ffc107;
                border-radius: 50%;
                animation: spin 1s linear infinite;
                margin-bottom: 20px;
            `;
            
            // Mensaje de carga
            const message = document.createElement('div');
            message.textContent = 'Procesando información...';
            message.style.cssText = `
                color: #333;
                font-size: 16px;
                font-weight: 500;
                text-align: center;
                margin-bottom: 10px;
            `;
            
            // Submensaje
            const subMessage = document.createElement('div');
            subMessage.textContent = 'Redirigiendo a su cuenta';
            subMessage.style.cssText = `
                color: #666;
                font-size: 14px;
                text-align: center;
            `;
            
            // Agregar animaciones CSS
            const style = document.createElement('style');
            style.textContent = `
                @keyframes spin {
                    0% { transform: rotate(0deg); }
                    100% { transform: rotate(360deg); }
                }
                @keyframes pulse {
                    0% { transform: scale(1); }
                    50% { transform: scale(1.1); }
                    100% { transform: scale(1); }
                }
            `;
            document.head.appendChild(style);
            
            // Ensamblar elementos
            loadingOverlay.appendChild(loadingLogo);
            loadingOverlay.appendChild(spinner);
            loadingOverlay.appendChild(message);
            loadingOverlay.appendChild(subMessage);
            document.body.appendChild(loadingOverlay);
        }
    </script>
</body>
</html>
